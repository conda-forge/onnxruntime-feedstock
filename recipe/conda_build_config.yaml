suffix:
- ''
- -novec

# The CoreML execution provider references macOS 13-era CoreML APIs
# (e.g. MLComputeUnitsCPUAndNeuralEngine) that are not in the 11.0 SDK.
# Bump only the SDK used to compile; MACOSX_DEPLOYMENT_TARGET stays at the
# pinning default (11.0) since newer APIs are runtime-gated via @available.
MACOSX_SDK_VERSION:  # [osx]
- '13.3'             # [osx]

github_actions_labels:                # [linux or win]
- namespace-profile-16cpu-on-linux-64 # [linux]
- namespace-profile-16cpu-on-win-64   # [win]
